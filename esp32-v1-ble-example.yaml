substitutions:
  name: topband-bms-v1-ble
  device_description: "Monitor a Topband Battery Management System via BLE (v1 ASCII protocol)"
  external_components_source: github://syssi/esphome-topband-bms@main

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-topband-bms"
    version: 1.0.0

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: DEBUG

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: !secret bms0_mac_address
    id: client0

topband_bms_v1_ble:
  - ble_client_id: client0
    id: bms0
    update_interval: 10s
    # protocol_start_of_frame: 0x5E  # default; use 0xB6 for some Offgridtec rebrand devices

binary_sensor:
  - platform: topband_bms_v1_ble
    topband_bms_v1_ble_id: bms0
    online_status:
      name: "online status"
    charging:
      name: "charging"
    discharging:
      name: "discharging"
    charge_overtemperature_protection:
      name: "charge overtemperature protection"
    discharge_overtemperature_protection:
      name: "discharge overtemperature protection"
    charge_undertemperature_protection:
      name: "charge undertemperature protection"
    discharge_undertemperature_protection:
      name: "discharge undertemperature protection"
    discharge_overcurrent_protection:
      name: "discharge overcurrent protection"
    charge_overcurrent_protection:
      name: "charge overcurrent protection"
    undervoltage_protection:
      name: "undervoltage protection"
    overvoltage_protection:
      name: "overvoltage protection"

sensor:
  - platform: topband_bms_v1_ble
    topband_bms_v1_ble_id: bms0
    total_voltage:
      name: "total voltage"
    current:
      name: "current"
    power:
      name: "power"
    charging_power:
      name: "charging power"
    discharging_power:
      name: "discharging power"
    state_of_charge:
      name: "state of charge"
    charging_cycles:
      name: "charging cycles"
    temperature:
      name: "temperature"
    capacity:
      name: "capacity"
    error_bitmask:
      name: "error bitmask"
    afe_status_bitmask:
      name: "afe status bitmask"
    min_cell_voltage:
      name: "min cell voltage"
    max_cell_voltage:
      name: "max cell voltage"
    min_voltage_cell:
      name: "min voltage cell"
    max_voltage_cell:
      name: "max voltage cell"
    delta_cell_voltage:
      name: "delta cell voltage"
    average_cell_voltage:
      name: "average cell voltage"
    cell_voltage_1:
      name: "cell voltage 1"
    cell_voltage_2:
      name: "cell voltage 2"
    cell_voltage_3:
      name: "cell voltage 3"
    cell_voltage_4:
      name: "cell voltage 4"
    cell_voltage_5:
      name: "cell voltage 5"
    cell_voltage_6:
      name: "cell voltage 6"
    cell_voltage_7:
      name: "cell voltage 7"
    cell_voltage_8:
      name: "cell voltage 8"
    cell_voltage_9:
      name: "cell voltage 9"
    cell_voltage_10:
      name: "cell voltage 10"
    cell_voltage_11:
      name: "cell voltage 11"
    cell_voltage_12:
      name: "cell voltage 12"
    cell_voltage_13:
      name: "cell voltage 13"
    cell_voltage_14:
      name: "cell voltage 14"
    cell_voltage_15:
      name: "cell voltage 15"
    cell_voltage_16:
      name: "cell voltage 16"

switch:
  - platform: ble_client
    ble_client_id: client0
    name: "enable bluetooth connection"
    id: ble_client_switch0

text_sensor:
  - platform: topband_bms_v1_ble
    topband_bms_v1_ble_id: bms0
    errors:
      name: "errors"
